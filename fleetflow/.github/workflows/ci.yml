name: fleetFlow

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile and Test
        run: mvn clean verify

      - name: Save JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fleetflow-executable
          path: target/*.jar